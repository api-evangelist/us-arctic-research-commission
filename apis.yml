description: >-
  The US Arctic Research Commission is an independent agency that provides recommendations
  and advice to the President and Congress on Arctic research and policy. The Commission
  works to promote research that improves our understanding of the Arctic environment
  and its impact on global climate change, as well as the Arctic's role in national
  security and economic development.
