    description: >-
      The US Arctic Research Commission (USARC) is an independent federal agency that advises
      the President and Congress on domestic and international Arctic research policy. The Commission
      establishes national policy, priorities, and goals for federal Arctic scientific research,
      advises the Interagency Arctic Research Policy Committee (IARPC) on developing five-year
      research plans, and coordinates with Arctic residents, international programs, and local
      institutions. Key focus areas include climate change, ecosystems, human health, Indigenous
      Knowledge, economic resilience, critical minerals, and international Arctic cooperation.
